<!DOCTYPE html>
<html lang="es" class="bg-neutral-950 text-neutral-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inteligencia Geoespacial - Observatorio Psicocriminal</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <link rel="stylesheet" href="styles.css" />
</head>

<body class="flex flex-col font-sans overflow-hidden">

<!-- LOADER -->
<div id="loader"
     class="fixed inset-0 bg-neutral-900 z-[9999] flex flex-col items-center justify-center">

    <div class="text-white font-mono text-sm">Cargando sistema...</div>

</div>

<!-- HEADER -->
<header class="bg-neutral-900 border-b border-neutral-800 h-14 flex items-center justify-between px-4 shrink-0">
    <div class="flex items-center space-x-3">
        <div class="bg-yellow-500 text-neutral-950 p-2 rounded font-black text-xs">OP</div>
        <div>
            <h1 class="text-sm font-bold uppercase">Mapa Psicocriminal Zacatecas</h1>
            <p class="text-[10px] text-neutral-400">Sistema de monitoreo territorial</p>
        </div>
    </div>
</header>

<!-- CONTENIDO -->
<div class="flex flex-1 overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-[32%] bg-neutral-900 border-r border-neutral-800 p-4 overflow-y-auto">

        <div class="text-xs text-neutral-400">
            Panel operativo
        </div>

    </aside>

    <!-- MAPA -->
    <main id="map-container" class="flex-1 relative h-full">

        <div id="map" class="w-full h-full"></div>

    </main>

</div>

<!-- LIBRERÍAS -->
<script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script defer src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script defer src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script defer src="config.js"></script>
<script defer src="app.js"></script>

<!-- FIX CRÍTICO -->
<script>
window.addEventListener("load", () => {
    setTimeout(() => {
        if (window.map) {
            map.invalidateSize();
        }
    }, 400);
});
</script>

</body>
</html>
